<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting to App...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- This line instantly redirects the browser to your Google Play Store page -->
    <meta http-equiv="refresh" content="0; url=https://play.google.com/store/apps/details?id=com.tilawa.quran.podcast.mp3quran">
    
    <!-- Backup JavaScript redirect just in case the meta tag fails -->
    <script>
        window.onload = function() {
            window.location.href = "https://play.google.com/store/apps/details?id=com.tilawa.quran.podcast.mp3quran";
        };
    </script>
    
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <h2>Opening App...</h2>
    <p>If you are not redirected automatically to the Play Store, <a href="https://play.google.com/store/apps/details?id=com.tilawa.quran.podcast.mp3quran">click here to download the app</a>.</p>
</body>
</html>
